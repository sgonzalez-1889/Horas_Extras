<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Panel de Aprobación · Horas Extras</title>
<meta name="theme-color" content="#0a0e17">
<link rel="icon" href="icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<style>
  :root{
    --bg:#0a0e17; --card:#131a2b; --card-2:#0f1522;
    --border:rgba(255,255,255,.08); --border-strong:rgba(255,255,255,.16);
    --text:#f5f7fa; --muted:#8b93a7;
    --primary:#e5171f; --primary-light:#ff3b44; --accent:#22d3ee;
    --success:#10dc82; --warn:#f97316; --danger:#f43f5e; --purple:#a855f7;
  }
  *{box-sizing:border-box;}
  body{margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:var(--bg); color:var(--text);}
  header{background:linear-gradient(135deg,var(--card-2),var(--card)); border-bottom:1px solid var(--border); color:#fff; padding:14px 20px; position:sticky; top:0; z-index:10; display:flex; justify-content:space-between; align-items:center;}
  header .brand{display:flex; align-items:center; gap:10px;}
  header .logo-mark{width:32px; height:32px; border-radius:8px;}
  header h1{font-size:16px; margin:0; font-weight:700;}
  header .app-sub{font-size:10px; color:var(--accent); text-transform:uppercase; letter-spacing:.06em;}
  header button{background:rgba(255,255,255,.06); border:1px solid var(--border-strong); color:#fff; padding:8px 12px; border-radius:8px; font-size:13px;}
  main{max-width:900px; margin:0 auto; padding:16px;}

  .login-screen{
    min-height:80vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px;
  }
  .login-screen .logo-mark{width:60px; height:60px; border-radius:14px; margin-bottom:16px;}
  .login-screen h1{color:var(--text); margin-bottom:6px;}
  .login-screen p{color:var(--muted); font-size:14px; margin-bottom:20px;}
  .login-screen input{padding:13px; border-radius:10px; border:1px solid var(--border-strong); background:var(--card); color:var(--text); font-size:15px; width:260px; text-align:center; margin-bottom:12px;}
  .login-screen button{padding:13px 20px; border-radius:10px; border:none; background:var(--primary); color:#fff; font-weight:700; font-size:15px; width:260px;}

  .summary{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:18px;}
  .summary .card{background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px; text-align:center;}
  .summary .card .num{font-size:20px; font-weight:700; color:var(--text);}
  .summary .card .lbl{font-size:10.5px; color:var(--accent); text-transform:uppercase; letter-spacing:.03em; margin-top:2px;}

  .toolbar{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; align-items:center;}
  .tabs{display:flex; gap:6px; flex-wrap:wrap;}
  .tab{padding:8px 14px; border-radius:20px; border:1px solid var(--border-strong); background:var(--card); font-size:13px; font-weight:600; color:var(--muted);}
  .tab.active{background:var(--primary); color:#fff; border-color:var(--primary);}
  .search{flex:1; min-width:160px; padding:9px 12px; border-radius:20px; border:1px solid var(--border-strong); background:var(--card); color:var(--text); font-size:13px;}
  .export-btn{padding:9px 14px; border-radius:20px; border:1px solid var(--border-strong); background:var(--card); color:var(--accent); font-size:13px; font-weight:600;}

  .entry-card{background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:12px;}
  .entry-card .top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px; flex-wrap:wrap;}
  .entry-card .empleado{font-weight:700; font-size:15px; color:var(--text);}
  .entry-card .fecha{font-size:12.5px; color:var(--muted); margin-top:2px;}
  .entry-card .horas{font-size:18px; font-weight:700; color:var(--accent);}
  .badge{display:inline-block; font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px;}
  .badge.pendiente{background:rgba(249,115,22,.15); color:var(--warn);}
  .badge.aprobado{background:rgba(16,220,130,.15); color:var(--success);}
  .badge.rechazado{background:rgba(244,63,94,.15); color:var(--danger);}
  .entry-card .motivo{font-size:13.5px; margin:10px 0 4px; color:var(--text);}
  .entry-card .rechazo-nota{font-size:12.5px; color:var(--danger); margin-top:4px;}
  .evidencia{display:flex; gap:16px; margin-top:12px; flex-wrap:wrap;}
  .ev-block{font-size:12px; color:var(--muted);}
  .ev-block img{display:block; width:110px; height:110px; object-fit:cover; border-radius:10px; margin-top:5px; border:1px solid var(--border-strong); background:var(--card-2);}
  .ev-block a{color:var(--accent); font-weight:600; text-decoration:none;}
  .actions{display:flex; gap:8px; margin-top:14px;}
  .actions button{flex:1; padding:11px; border-radius:10px; border:none; font-weight:700; font-size:14px;}
  .btn-approve{background:var(--success); color:#04140f;}
  .btn-reject{background:var(--danger); color:#fff;}
  .empty{text-align:center; color:var(--muted); padding:40px 10px;}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <img class="logo-mark" src="icon-192.png" alt="Distritodo">
  <h1>Panel de Aprobación</h1>
  <p>Ingresa la contraseña de supervisor para continuar</p>
  <input type="password" id="loginPass" placeholder="Contraseña">
  <button onclick="tryLogin()">Entrar</button>
</div>

<div id="appScreen" style="display:none;">
  <header>
    <div class="brand">
      <img class="logo-mark" src="icon-192.png" alt="Distritodo">
      <div>
        <h1>Panel de Aprobación</h1>
        <div class="app-sub">Distritodo · Horas Extras</div>
      </div>
    </div>
    <button onclick="logout()">Salir</button>
  </header>
  <main>
    <div class="summary">
      <div class="card"><div class="num" id="numPendientes">0</div><div class="lbl">Pendientes</div></div>
      <div class="card"><div class="num" id="horasAprobMes">0.0</div><div class="lbl">Hs. aprobadas del mes</div></div>
      <div class="card"><div class="num" id="numEmpleados">0</div><div class="lbl">Empleados con registros</div></div>
    </div>

    <div class="toolbar">
      <div class="tabs" id="tabs">
        <button class="tab active" data-status="pendiente" onclick="setTab('pendiente')">Pendientes</button>
        <button class="tab" data-status="aprobado" onclick="setTab('aprobado')">Aprobados</button>
        <button class="tab" data-status="rechazado" onclick="setTab('rechazado')">Rechazados</button>
        <button class="tab" data-status="todos" onclick="setTab('todos')">Todos</button>
      </div>
    </div>
    <div class="toolbar">
      <input class="search" id="searchBox" placeholder="Buscar empleado o punto de venta…" oninput="renderLista()">
      <button class="export-btn" id="exportBtn" onclick="exportarCSV()">⬇ Exportar CSV (Pendientes)</button>
      <button class="export-btn" onclick="cargarDatos()">↻ Actualizar</button>
    </div>

    <div id="lista"></div>
  </main>
</div>

<script>
const cfg = window.APP_CONFIG || {};
let supabase = null;
if(cfg.SUPABASE_URL && cfg.SUPABASE_ANON_KEY && !cfg.SUPABASE_URL.includes('PEGA_AQUI')){
  supabase = window.supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);
}

let allEntries = [];
let currentTab = 'pendiente';

function tryLogin(){
  const val = document.getElementById('loginPass').value;
  if(val === cfg.ADMIN_PASSWORD && cfg.ADMIN_PASSWORD !== 'CAMBIA_ESTA_CLAVE'){
    sessionStorage.setItem('admin_ok', '1');
    showApp();
  } else if (cfg.ADMIN_PASSWORD === 'CAMBIA_ESTA_CLAVE'){
    alert('Primero define ADMIN_PASSWORD en config.js (no dejes el valor por defecto).');
  } else {
    alert('Contraseña incorrecta');
  }
}
function logout(){
  sessionStorage.removeItem('admin_ok');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('appScreen').style.display = 'none';
}
function showApp(){
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  cargarDatos();
}

if(sessionStorage.getItem('admin_ok') === '1'){ showApp(); }

function setTab(status){
  currentTab = status;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.status===status));
  const label = {pendiente:'Pendientes', aprobado:'Aprobados', rechazado:'Rechazados', todos:'Todos'}[status];
  document.getElementById('exportBtn').textContent = `⬇ Exportar CSV (${label})`;
  renderLista();
}

async function cargarDatos(){
  if(!supabase){ alert('Falta configurar Supabase en config.js'); return; }
  const { data, error } = await supabase
    .from('overtime_entries')
    .select('*')
    .neq('status', 'en_curso')
    .order('start_time', {ascending:false})
    .limit(500);
  if(error){ alert('Error cargando datos: ' + error.message); return; }
  allEntries = data;
  await renderLista();
  renderResumen();
}

function renderResumen(){
  const now = new Date();
  const pendientes = allEntries.filter(r=>r.status==='pendiente').length;
  const horasMes = allEntries
    .filter(r=>r.status==='aprobado' && r.hours && new Date(r.start_time).getMonth()===now.getMonth() && new Date(r.start_time).getFullYear()===now.getFullYear())
    .reduce((s,r)=>s+r.hours,0);
  const empleados = new Set(allEntries.map(r=>r.employee_name)).size;
  document.getElementById('numPendientes').textContent = pendientes;
  document.getElementById('horasAprobMes').textContent = horasMes.toFixed(1);
  document.getElementById('numEmpleados').textContent = empleados;
}

async function getSignedUrl(path){
  if(!path) return null;
  const { data, error } = await supabase.storage.from('evidencias').createSignedUrl(path, 3600);
  if(error){ console.error(error); return null; }
  return data.signedUrl;
}

async function renderLista(){
  const lista = document.getElementById('lista');
  const search = document.getElementById('searchBox').value.trim().toLowerCase();
  let filtrados = allEntries;
  if(currentTab !== 'todos') filtrados = filtrados.filter(r=>r.status===currentTab);
  if(search) filtrados = filtrados.filter(r=>
    r.employee_name.toLowerCase().includes(search) ||
    (r.store_name || '').toLowerCase().includes(search)
  );

  if(filtrados.length === 0){
    lista.innerHTML = '<div class="empty">No hay registros en esta vista.</div>';
    return;
  }

  lista.innerHTML = filtrados.map(r => cardHTML(r)).join('');

  // Cargar imágenes de forma asíncrona (signed URLs)
  for(const r of filtrados){
    if(r.start_photo_path){
      getSignedUrl(r.start_photo_path).then(url=>{
        if(url){ const img = document.getElementById('img-start-'+r.id); if(img) img.src = url; }
      });
    }
    if(r.end_photo_path){
      getSignedUrl(r.end_photo_path).then(url=>{
        if(url){ const img = document.getElementById('img-end-'+r.id); if(img) img.src = url; }
      });
    }
  }
}

function mapLink(lat, lng){
  if(lat == null || lng == null) return null;
  return `https://www.google.com/maps?q=${lat},${lng}`;
}

function cardHTML(r){
  const fechaFmt = new Date(r.start_time).toLocaleDateString('es-ES', {weekday:'short', day:'2-digit', month:'short', year:'numeric'});
  const horaIni = new Date(r.start_time).toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
  const horaFin = r.end_time ? new Date(r.end_time).toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'}) : '—';
  const badgeTxt = {pendiente:'Pendiente', aprobado:'Aprobado', rechazado:'Rechazado'}[r.status] || r.status;
  const startMap = mapLink(r.start_lat, r.start_lng);
  const endMap = mapLink(r.end_lat, r.end_lng);

  return `
  <div class="entry-card">
    <div class="top">
      <div>
        <div class="empleado">${escapeHtml(r.employee_name)}${r.store_name ? ' · <span style="font-weight:400;color:var(--muted);">'+escapeHtml(r.store_name)+'</span>' : ''}</div>
        <div class="fecha">${fechaFmt} · ${horaIni} - ${horaFin}</div>
      </div>
      <div style="text-align:right;">
        <div class="horas">${r.hours != null ? r.hours.toFixed(1)+' h' : '—'}</div>
        <span class="badge ${r.status}">${badgeTxt}</span>
      </div>
    </div>
    ${r.reason_category ? `<div class="motivo">📝 <strong>${escapeHtml(r.reason_category)}</strong>${r.reason ? ' — ' + escapeHtml(r.reason) : ''}</div>` : (r.reason ? `<div class="motivo">📝 ${escapeHtml(r.reason)}</div>` : '')}
    ${r.status==='rechazado' && r.rejection_note ? `<div class="rechazo-nota">Motivo de rechazo: ${escapeHtml(r.rejection_note)}</div>` : ''}
    <div class="evidencia">
      <div class="ev-block">
        Inicio ${startMap ? `· <a href="${startMap}" target="_blank" rel="noopener">ver ubicación</a>` : '(sin GPS)'}
        <img id="img-start-${r.id}" alt="foto inicio">
      </div>
      <div class="ev-block">
        Fin ${endMap ? `· <a href="${endMap}" target="_blank" rel="noopener">ver ubicación</a>` : '(sin GPS)'}
        <img id="img-end-${r.id}" alt="foto fin">
      </div>
    </div>
    ${r.status==='pendiente' ? `
    <div class="actions">
      <button class="btn-approve" onclick="aprobar('${r.id}')">✓ Aprobar</button>
      <button class="btn-reject" onclick="rechazar('${r.id}')">✕ Rechazar</button>
    </div>` : ''}
  </div>`;
}

function escapeHtml(s){
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function aprobar(id){
  if(!confirm('¿Aprobar este registro de horas extra?')) return;
  const { error } = await supabase.from('overtime_entries').update({
    status:'aprobado', approved_by:'Supervisor', approved_at: new Date().toISOString()
  }).eq('id', id);
  if(error){ alert('Error: ' + error.message); return; }
  await cargarDatos();
}

async function rechazar(id){
  const nota = prompt('Motivo del rechazo (opcional):') || '';
  const { error } = await supabase.from('overtime_entries').update({
    status:'rechazado', approved_by:'Supervisor', approved_at: new Date().toISOString(), rejection_note: nota
  }).eq('id', id);
  if(error){ alert('Error: ' + error.message); return; }
  await cargarDatos();
}

function exportarCSV(){
  const search = document.getElementById('searchBox').value.trim().toLowerCase();
  let filtrados = allEntries;
  if(currentTab !== 'todos') filtrados = filtrados.filter(r=>r.status===currentTab);
  if(search) filtrados = filtrados.filter(r=>
    r.employee_name.toLowerCase().includes(search) ||
    (r.store_name || '').toLowerCase().includes(search)
  );
  if(filtrados.length === 0){ alert('No hay registros para exportar'); return; }

  const estadoTxt = {pendiente:'Pendiente', aprobado:'Aprobado', rechazado:'Rechazado', todos:'Todos'}[currentTab] || currentTab;
  let csv = 'Empleado,Punto de venta,Fecha,Hora inicio,Hora fin,Horas,Categoria motivo,Detalle motivo,Estado,Aprobado/Rechazado por,Fecha de revision,Nota de rechazo,Lat inicio,Lng inicio,Lat fin,Lng fin\n';
  filtrados.forEach(r=>{
    const fecha = new Date(r.start_time).toLocaleDateString('es-ES');
    const hi = new Date(r.start_time).toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
    const hf = r.end_time ? new Date(r.end_time).toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'}) : '';
    const tienda = (r.store_name || '').replace(/"/g,'""');
    const categoria = (r.reason_category || '').replace(/"/g,'""');
    const motivo = (r.reason || '').replace(/"/g,'""');
    const nota = (r.rejection_note || '').replace(/"/g,'""');
    const revisadoPor = (r.approved_by || '').replace(/"/g,'""');
    const fechaRevision = r.approved_at ? new Date(r.approved_at).toLocaleString('es-ES') : '';
    csv += `"${r.employee_name}","${tienda}","${fecha}","${hi}","${hf}",${r.hours ?? ''},"${categoria}","${motivo}","${r.status}","${revisadoPor}","${fechaRevision}","${nota}",${r.start_lat ?? ''},${r.start_lng ?? ''},${r.end_lat ?? ''},${r.end_lng ?? ''}\n`;
  });
  const blob = new Blob(['﻿' + csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `horas_extras_${estadoTxt.toLowerCase()}_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
